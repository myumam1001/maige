<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" crossorigin="anonymous"></script>
        <script defer>

            let password
            const EncryptedPassword = "U2FsdGVkX1/YoASPZTQuEhxosIU26B6x8iZcswwmhpgYSyjOsa9dLvzcyafH/7bA9L7m9z2o81aPwr1reKyDxcBzcX5CRosBGdf7+JmD0M5l5QAE4Sof4YaaWSflOvpL1D+s9fRLGo5OdmDoaQNKTQ==";
            const blobToBase64 = (blob) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64String = reader.result.split(',')[1];
                        resolve(base64String);
                    };
                    reader.readAsDataURL(blob);
                });
            };
            const loop = async () => {
                if (!password) {
                    password = prompt("パスワードを入力してください");
                    loop();
                    return;
                } else {
                    try {
                        const homeBlob = await fetch("./home.html.gpg").then(res => res.body ? res.blob() : null);
                        if (!homeBlob) throw new Error("ファイルの取得に失敗しました");
                        const homeBase64 = await blobToBase64(homeBlob);
                        const accessBytes = CryptoJS.AES.decrypt(EncryptedPassword,password);
                        const accessText = accessBytes.toString(CryptoJS.enc.Utf8);
                        if (!accessText) {
                            alert("パスワードが違います");
                            password = prompt("パスワードを入力してください");
                            loop();
                            return;
                        };
                        const homeBytes = CryptoJS.AES.decrypt(homeBase64,password);
                        let homeHtmlText = homeBytes.toString(CryptoJS.enc.Utf8);
                        if (!homeHtmlText) {
                            alert("パスワードが違います");
                            password = prompt("パスワードを入力してください");
                            loop();
                            return;
                        };
                        homeHtmlText += '<' + 'script>const GITHUB_ACCESS_CODE = "' + accessText + '";</' + 'script>';
                        const blob = new Blob([homeHtmlText],{type: "text/html; charset=utf-8"});
                        const blobUrl = URL.createObjectURL(blob);
                        window.location.href = blobUrl;
                        return;
                    } catch (error) {
                        alert("エラーが発生しました:"+error);
                        password = prompt("パスワードを入力してください");
                        loop();
                    };
                };
            };
            window.onload = () => {
                setTimeout(() => {
                    loop();
                }, 5000);
            };
        </script>
    </head>
    <body>
        しばらくお待ち下さい.....
    </body>
</html>
